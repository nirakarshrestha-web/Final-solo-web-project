  <header class="site-header">

      <h2 class="logo">Nirakar</h2>

      <div class="nav-actions">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">🌙</button>
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>

      <nav class="nav" id="navMenu">

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Contact Me</h1>
        <p>Feel free to send me a message.</p>
      </div>
    </section>

    <section class="section">
     <form action="https://api.web3forms.com/submit" method="POST">

  <input type="hidden" name="access_key" value="bafb6a3e-8fda-4056-96d5-217dc08590e3">

  <div class="form-group">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required />
  </div>

  <div class="form-group">
    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required />
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Send Message</button>

</form>
      </div>
    </section>
    <div class="social-section">
  <h3>Connect with me</h3>

  <div class="social-links">
    <a href="https://instagram.com" target="_blank" class="social-btn instagram">
      📸 Instagram
    </a>

    <a href="https://facebook.com" target="_blank" class="social-btn facebook">
      👍 Facebook
    </a>
  </div>
</div>
