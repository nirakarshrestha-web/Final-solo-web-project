<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirakar | Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <h2 class="logo">Nirakar</h2>

      <div class="nav-actions">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">🌙</button>
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>
      </div>

      <nav class="nav" id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Contact Me</h1>
        <p>Feel free to send me a message.</p>
      </div>
    </section>

    <section class="section">
      <div class="container form-wrapper">
        <form id="contactForm" novalidate>
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
            <small class="error" id="nameError"></small>
          </div>

          <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" placeholder="Enter your email" />
            <small class="error" id="emailError"></small>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="6" placeholder="Write your message"></textarea>
            <small class="error" id="messageError"></small>
          </div>

          <button type="submit" class="btn btn-primary">Send Message</button>
          <p id="formSuccess" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; <span id="year"></span> Nirakar Portfolio</p>
    </div>
  </footer>

  <script src="js/scripts.js"></script>
</body>
</html>
